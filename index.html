<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coach</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <div class="app-container">

    <!-- ════════════════════════════════════════════════════════
         TAB: TODAY
         ════════════════════════════════════════════════════════ -->
    <div class="tab-content active" id="tab-today">

      <!-- Date Header -->
      <div class="date-header">
        <button class="date-nav-btn" id="date-prev">&larr;</button>
        <div>
          <div class="date-text" id="date-display"></div>
          <div class="date-sub" id="date-day-type"></div>
        </div>
        <button class="date-nav-btn" id="date-next">&rarr;</button>
      </div>

      <!-- Protein Progress Bar (sticky) -->
      <div class="protein-bar-container">
        <div class="protein-bar-label" id="protein-label">
          <span class="current" id="protein-current">0g</span>
          <span class="target" id="protein-target">/ 148g protein</span>
        </div>
        <div class="protein-bar">
          <div class="protein-bar-fill" id="protein-fill" style="width: 0%"></div>
        </div>
      </div>

      <!-- Card: Morning Vitals -->
      <div class="card" id="vitals-card">
        <div class="card-header">
          <span class="card-title">Morning Vitals</span>
          <button class="card-collapse-btn" id="vitals-collapse">collapse</button>
        </div>
        <div class="card-summary" id="vitals-summary"></div>
        <div class="card-body" id="vitals-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Weight (kg)</label>
              <input type="number" class="form-input" id="input-weight" inputmode="decimal" step="0.1" placeholder="78.5">
            </div>
            <div class="form-group">
              <label class="form-label">Sleep (h)</label>
              <input type="number" class="form-input" id="input-sleep" inputmode="decimal" step="0.5" placeholder="7">
            </div>
            <div class="form-group">
              <label class="form-label">Cigs</label>
              <input type="number" class="form-input" id="input-cigs" inputmode="numeric" placeholder="3">
            </div>
          </div>
          <!-- Monday only: waist -->
          <div class="form-row hidden" id="waist-row">
            <div class="form-group">
              <label class="form-label">Waist (inches) — Monday only</label>
              <input type="number" class="form-input" id="input-waist" inputmode="decimal" step="0.5" placeholder="33.5">
            </div>
          </div>
          <button class="btn btn-primary mt-8" id="save-vitals">Save Vitals</button>
        </div>
      </div>

      <!-- Card: Today's Plan -->
      <div class="card" id="plan-card">
        <div class="card-header">
          <span class="card-title">Today's Plan</span>
        </div>
        <div class="card-body">
          <div class="directive" id="plan-directive">Loading plan...</div>
          <div id="plan-training-summary" class="mb-12"></div>
          <div class="collapsible-toggle" id="plan-warmup-toggle">Warm-up / Cool-down</div>
          <div class="collapsible-content" id="plan-warmup-content"></div>
          <div class="collapsible-toggle" id="plan-meals-toggle">Meal Plan</div>
          <div class="collapsible-content" id="plan-meals-content"></div>
        </div>
      </div>

      <!-- Card: Training Log (run/workout day only) -->
      <div class="card hidden" id="training-card">
        <div class="card-header">
          <span class="card-title" id="training-title">Training Log</span>
        </div>
        <div class="card-body">
          <!-- Done toggle -->
          <button class="toggle-btn" id="training-done-btn">
            <span class="toggle-circle"></span>
            <span>Mark as Done</span>
          </button>

          <!-- Run fields -->
          <div class="hidden mt-12" id="run-fields">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Actual km</label>
                <input type="number" class="form-input" id="input-run-km" inputmode="decimal" step="0.1" placeholder="3.0">
              </div>
              <div class="form-group">
                <label class="form-label">Time (mm:ss)</label>
                <input type="text" class="form-input" id="input-run-time" placeholder="24:15">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Avg Pace</label>
                <input type="text" class="form-input" id="input-run-pace" placeholder="8:05/km">
              </div>
              <div class="form-group">
                <label class="form-label">Cadence</label>
                <input type="number" class="form-input" id="input-run-cadence" inputmode="numeric" placeholder="150">
              </div>
            </div>
            <div class="form-group mb-12">
              <label class="form-label">RPE (1-10)</label>
              <div class="rpe-slider-container">
                <input type="range" class="rpe-slider" id="input-run-rpe" min="1" max="10" value="5">
                <span class="rpe-value" id="run-rpe-value">5</span>
              </div>
            </div>
            <div class="form-group mb-12">
              <label class="form-label">Knee Status</label>
              <div class="segmented" id="knee-segmented">
                <button class="segment active" data-value="Pain-free">Pain-free</button>
                <button class="segment" data-value="Minor pressure">Minor</button>
                <button class="segment" data-value="Discomfort">Discomfort</button>
                <button class="segment" data-value="Pain">Pain</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Notes</label>
              <textarea class="form-input" id="input-run-notes" placeholder="How did it feel?"></textarea>
            </div>
          </div>

          <!-- Workout fields -->
          <div class="hidden mt-12" id="workout-fields">
            <div class="form-group mb-12">
              <label class="form-label">What I Did</label>
              <textarea class="form-input" id="input-workout-what" placeholder="Pull-ups 4x6, Push-ups 3x12..."></textarea>
            </div>
            <div class="form-group mb-12">
              <label class="form-label">RPE (1-10)</label>
              <div class="rpe-slider-container">
                <input type="range" class="rpe-slider" id="input-workout-rpe" min="1" max="10" value="5">
                <span class="rpe-value" id="workout-rpe-value">5</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Notes</label>
              <textarea class="form-input" id="input-workout-notes" placeholder="Any issues or deviations?"></textarea>
            </div>
          </div>

          <button class="btn btn-primary mt-16" id="save-training">Save Training Log</button>
        </div>
      </div>

      <!-- Card: Meals Summary -->
      <div class="card" id="meals-summary-card">
        <div class="card-header">
          <span class="card-title">Meals Logged</span>
        </div>
        <div class="card-body">
          <div id="meals-summary-list" class="text-muted">No meals logged yet</div>
          <button class="btn btn-secondary mt-12" id="go-to-food">Log Food &rarr;</button>
        </div>
      </div>

      <!-- Card: Notes / Deviations -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Notes / Deviations</span>
        </div>
        <div class="card-body">
          <textarea class="form-input" id="input-notes" placeholder="Anything that deviated from the plan..."></textarea>
          <button class="btn btn-secondary mt-12" id="save-notes">Save Notes</button>
        </div>
      </div>

    </div>

    <!-- ════════════════════════════════════════════════════════
         TAB: FOOD
         ════════════════════════════════════════════════════════ -->
    <div class="tab-content" id="tab-food">
      <h2 style="font-size: 18px; font-weight: 600; padding: 12px 0 4px;">Log Food</h2>

      <!-- Meal slot pills -->
      <div class="meal-slots" id="meal-slots"></div>

      <!-- Planned meal hint -->
      <div class="text-muted" style="font-size: 13px; padding: 4px 0 8px; min-height: 20px;" id="meal-hint"></div>

      <!-- Food grid -->
      <div class="food-grid" id="food-grid"></div>

      <!-- Text notes -->
      <div class="form-group mt-12">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" id="food-notes" placeholder="e.g., bhurji style, extra ghee..." style="min-height: 50px;"></textarea>
      </div>

      <!-- Current slot summary -->
      <div class="meal-summary" id="meal-summary"></div>

      <!-- Save button (above sticky footer space) -->
      <div style="padding-bottom: 100px;">
        <button class="btn btn-primary btn-large mt-12" id="save-meal">Save Meal</button>
      </div>
    </div>

    <!-- ════════════════════════════════════════════════════════
         TAB: WEEK
         ════════════════════════════════════════════════════════ -->
    <div class="tab-content" id="tab-week">
      <h2 style="font-size: 18px; font-weight: 600; padding: 12px 0 8px;">Week Plan</h2>
      <div id="week-cards"></div>
    </div>

    <!-- ════════════════════════════════════════════════════════
         TAB: DEBRIEF
         ════════════════════════════════════════════════════════ -->
    <div class="tab-content" id="tab-debrief">
      <h2 style="font-size: 18px; font-weight: 600; padding: 12px 0 8px;">End of Day Debrief</h2>
      <p class="text-secondary mb-12" style="font-size: 14px;">Generate your daily log to paste into Claude for coaching feedback.</p>

      <button class="btn btn-secondary btn-large" id="generate-debrief">Generate Debrief</button>

      <div class="debrief-preview hidden" id="debrief-preview"></div>

      <button class="btn btn-primary btn-large mt-12 hidden" id="copy-debrief">Copy to Clipboard</button>
      <div class="copy-success" id="copy-success">Copied!</div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════════
       BOTTOM NAV
       ══════════════════════════════════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-tab active" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Today
    </button>
    <button class="nav-tab" data-tab="food">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      Food
    </button>
    <button class="nav-tab" data-tab="week">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/>
      </svg>
      Week
    </button>
    <button class="nav-tab" data-tab="debrief">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Debrief
    </button>
  </nav>

  <!-- Custom Food Modal -->
  <div class="modal-overlay" id="custom-food-modal">
    <div class="modal">
      <div class="modal-title">Add Custom Item</div>
      <div class="form-group mb-12">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" id="custom-name" placeholder="e.g., Soy chunks">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Protein (g)</label>
          <input type="number" class="form-input" id="custom-protein" inputmode="numeric" placeholder="15">
        </div>
        <div class="form-group">
          <label class="form-label">Calories</label>
          <input type="number" class="form-input" id="custom-calories" inputmode="numeric" placeholder="120">
        </div>
      </div>
      <div class="form-row mt-12">
        <button class="btn btn-secondary" id="custom-cancel">Cancel</button>
        <button class="btn btn-primary" id="custom-add">Add</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
